<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <!-- Background Sky-Water Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bc4f3"/>
      <stop offset="40%" stop-color="#0a9bd5"/>
      <stop offset="100%" stop-color="#026b9a"/>
    </linearGradient>

    <!-- Organic Aurora Green Gradient -->
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8e063" stop-opacity="0"/>
      <stop offset="50%" stop-color="#56ab2f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a8e063" stop-opacity="0"/>
    </linearGradient>

    <!-- Glass Panel Reflection Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Glass Panel Highlight Gradient -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Bubble Radial Gradient (Glass Ball) -->
    <radialGradient id="bubbleGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="15%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#e0f7fa" stop-opacity="0.2"/>
      <stop offset="85%" stop-color="#80deea" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#26c6da" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Button Gradient -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#76b852"/>
      <stop offset="50%" stop-color="#8dc26f"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>

    <!-- Vista Windows Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#002b40" flood-opacity="0.5"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Sky -->
  <rect width="320" height="200" fill="url(#skyGrad)"/>

  <!-- Organic Aurora Waves / S-Curves (Typical Frutiger Aero) -->
  <path d="M -20 220 Q 80 140 180 170 T 340 130 L 340 220 Z" fill="url(#grassGrad)"/>
  <path d="M -20 180 Q 90 90 190 130 T 340 80 L 340 220 Z" fill="#ffffff" fill-opacity="0.08"/>
  <path d="M -20 130 Q 100 160 220 100 T 340 120 L 340 220 Z" fill="#00e5ff" fill-opacity="0.12"/>

  <!-- Abstract Water Ribbon Wave -->
  <path d="M-20,110 C80,70 140,160 240,100 C280,76 300,80 340,90 L340,220 L-20,220 Z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Vista-Style Glass Window -->
  <g filter="url(#shadow)" transform="translate(60, 30)">
    <!-- Main Window Background (Aero Glass) -->
    <rect width="200" height="130" rx="8" fill="url(#glassGrad)"/>
    <rect width="200" height="130" rx="8" fill="none" stroke="url(#glassBorder)" stroke-width="1.5"/>

    <!-- Vista Titlebar (Solidified glass top bar) -->
    <path d="M 8 0 L 192 0 A 8 8 0 0 1 200 8 L 200 24 L 0 24 L 0 8 A 8 8 0 0 1 8 0 Z" fill="#ffffff" fill-opacity="0.15"/>
    <line x1="0" y1="24" x2="200" y2="24" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
    
    <!-- Titlebar Buttons (Vista Style Red/Close, Max, Min) -->
    <circle cx="190" cy="12" r="4" fill="#ff4d4d" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="178" cy="12" r="4" fill="#a6a6a6" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="166" cy="12" r="4" fill="#a6a6a6" stroke="#ffffff" stroke-width="0.5"/>

    <!-- Window Title -->
    <text x="12" y="16" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="9" fill="#ffffff" fill-opacity="0.9">Aero Decrypter</text>

    <!-- Inner Window Canvas -->
    <rect x="8" y="32" width="184" height="90" rx="4" fill="#ffffff" fill-opacity="0.65"/>
    <rect x="8" y="32" width="184" height="90" rx="4" fill="none" stroke="#ffffff" stroke-width="0.5"/>

    <!-- Hacking / Guessing Clues Graphic -->
    <!-- Input box representation -->
    <rect x="42" y="50" width="100" height="22" rx="4" fill="#ffffff" stroke="#90caf9" stroke-width="1" filter="url(#glow)"/>
    <text x="50" y="65" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="12" fill="#0d47a1">5 8</text>
    
    <!-- Glowing green cursor -->
    <line x1="78" y1="54" x2="78" y2="68" stroke="#4CAF50" stroke-width="2" filter="url(#glow)"/>

    <!-- Arrow feedback indicators (Up / Down) -->
    <g transform="translate(150, 48)">
      <!-- Green Up Arrow (Too low) -->
      <path d="M 12 2 L 6 8 L 10 8 L 10 16 L 14 16 L 14 8 L 18 8 Z" fill="#4CAF50" filter="url(#glow)"/>
    </g>
    <g transform="translate(15, 48)">
      <!-- Red Down Arrow (Too high) -->
      <path d="M 12 16 L 6 10 L 10 10 L 10 2 L 14 2 L 14 10 L 18 10 Z" fill="#e53935" filter="url(#glow)"/>
    </g>

    <!-- Glass 3D Guess Button -->
    <rect x="62" y="86" width="60" height="18" rx="4" fill="url(#btnGrad)" stroke="#43a047" stroke-width="0.5"/>
    <text x="92" y="99" font-family="'Segoe UI', system-ui, sans-serif" font-weight="bold" font-size="8" fill="#ffffff" text-anchor="middle">GUESS</text>
    <path d="M 64 88 L 120 88 A 2 2 0 0 1 122 90 L 122 92 L 62 92 L 62 90 A 2 2 0 0 1 64 88 Z" fill="#ffffff" fill-opacity="0.3"/>
  </g>

  <!-- Glossy 3D Floating Bubbles (Humanist Organic Aero feel) -->
  <!-- Bubble 1 -->
  <circle cx="45" cy="80" r="12" fill="url(#bubbleGrad)" filter="url(#shadow)"/>
  <ellipse cx="41" cy="74" rx="4" ry="2.5" fill="#ffffff" fill-opacity="0.8" transform="rotate(-30, 41, 74)"/>
  
  <!-- Bubble 2 -->
  <circle cx="280" cy="60" r="16" fill="url(#bubbleGrad)" filter="url(#shadow)"/>
  <ellipse cx="275" cy="52" rx="5" ry="3" fill="#ffffff" fill-opacity="0.8" transform="rotate(-30, 275, 52)"/>

  <!-- Bubble 3 (Small) -->
  <circle cx="270" cy="140" r="8" fill="url(#bubbleGrad)" filter="url(#shadow)"/>
  <ellipse cx="267" cy="136" rx="2.5" ry="1.5" fill="#ffffff" fill-opacity="0.8" transform="rotate(-30, 267, 136)"/>

  <!-- Bubble 4 (Small) -->
  <circle cx="35" cy="150" r="6" fill="url(#bubbleGrad)"/>
  <ellipse cx="33" cy="147" rx="1.8" ry="1" fill="#ffffff" fill-opacity="0.8" transform="rotate(-30, 33, 147)"/>
</svg>
