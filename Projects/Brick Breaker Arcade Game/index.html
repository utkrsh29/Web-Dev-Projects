<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Brick Breaker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-item">
        <span class="hud-lbl">Score</span>
        <span class="hud-val" id="scoreVal">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">High Score</span>
        <span class="hud-val accent" id="highScoreVal">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">Lives</span>
        <span class="hud-val" id="livesVal">3</span>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <div class="overlay" id="overlay">
      <div class="modal" id="modal">
        <h2 class="modal-title" id="modalTitle">Game Over</h2>
        <p class="modal-body" id="modalBody">You ran out of lives.</p>
        <button class="modal-btn" id="resetBtn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
