<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- Background -->
  <rect width="320" height="200" fill="#f5f3ff"/>
  
  <!-- Header / Navigation Bar -->
  <rect x="20" y="15" width="280" height="24" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <circle cx="36" cy="27" r="5" fill="#a78bfa"/>
  <rect x="52" y="23" width="70" height="8" rx="4" fill="#ddd6fe"/>
  <rect x="230" y="21" width="50" height="12" rx="6" fill="#a78bfa"/>

  <!-- Gallery Grid Items -->
  <!-- Card 1: Mountain landscape representation -->
  <g transform="translate(20, 52)">
    <rect width="85" height="125" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
    <rect x="6" y="6" width="73" height="75" rx="5" fill="#f3e8ff"/>
    <!-- Mountain path -->
    <path d="M 6 81 L 35 48 L 55 68 L 72 52 L 79 62 L 79 81 Z" fill="#818cf8"/>
    <path d="M 30 81 L 55 58 L 79 81 Z" fill="#c084fc"/>
    <circle cx="60" cy="22" r="6" fill="#fde047"/>
    <!-- Caption -->
    <rect x="8" y="90" width="55" height="7" rx="3.5" fill="#1e1b4b"/>
    <rect x="8" y="103" width="35" height="5" rx="2.5" fill="#a78bfa"/>
  </g>

  <!-- Card 2: Circle/Abstract representation -->
  <g transform="translate(117, 52)">
    <rect width="85" height="125" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
    <rect x="6" y="6" width="73" height="75" rx="5" fill="#fae8ff"/>
    <!-- Abstract circle and details -->
    <circle cx="42" cy="43" r="22" fill="#e879f9" opacity="0.6"/>
    <circle cx="50" cy="48" r="14" fill="#a78bfa" opacity="0.8"/>
    <!-- Caption -->
    <rect x="8" y="90" width="45" height="7" rx="3.5" fill="#1e1b4b"/>
    <rect x="8" y="103" width="55" height="5" rx="2.5" fill="#a78bfa"/>
  </g>

  <!-- Card 3: Waves/Ocean representation -->
  <g transform="translate(214, 52)">
    <rect width="85" height="125" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
    <rect x="6" y="6" width="73" height="75" rx="5" fill="#e0f2fe"/>
    <!-- Wave path -->
    <path d="M 6 70 C 20 60, 30 80, 50 65 C 65 55, 75 75, 79 68 L 79 81 L 6 81 Z" fill="#38bdf8"/>
    <path d="M 6 76 C 25 70, 45 78, 79 74 L 79 81 L 6 81 Z" fill="#0284c7"/>
    <!-- Caption -->
    <rect x="8" y="90" width="50" height="7" rx="3.5" fill="#1e1b4b"/>
    <rect x="8" y="103" width="40" height="5" rx="2.5" fill="#a78bfa"/>
  </g>
</svg>
