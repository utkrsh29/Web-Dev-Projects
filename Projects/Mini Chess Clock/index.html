<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Chess Clock</title>
  <link rel="stylesheet" href="chess-clock.css">
</head>
<body>
  <div class="clock-container">
    <h1>Mini Chess Clock</h1>
    <div class="player" id="player1">
      <h2>Player 1</h2>
      <p id="time1">05:00</p>
      <button id="btn1">End Turn</button>
    </div>
    <div class="player" id="player2">
      <h2>Player 2</h2>
      <p id="time2">05:00</p>
      <button id="btn2">End Turn</button>
    </div>
    <button id="resetBtn">Reset Game</button>
  </div>
  <script src="chess-clock.js"></script>
</body>
</html>
